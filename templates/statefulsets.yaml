apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresRclone.fullname" . }}
  labels:
    {{- include "postgresRclone.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "postgresRclone.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "postgresRclone.service.main" . }}
  replicas: 1
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "postgresRclone.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.postgres.terminationGracePeriodSeconds | default 60 }}
      initContainers:
      - name: {{ include "postgresRclone.name" . }}-rclone
        image: {{ .Values.rclone.image }}
        command: ["/bin/sh","-c"]
        args:
        - |
          #!/bin/sh
          cp /usr/local/bin/rclone /shared/rclone
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: vol-shared
          mountPath: /shared
      containers:
      - name: {{ include "postgresRclone.name" . }}-db
        image: {{ .Values.postgres.image }}
        command: ["/bin/sh","-c"]
        args:
        - "exec /bin/sh /postgres-init/init.sh"
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "postgresRclone.secret.superuser.password" . }}
              key: POSTGRES_PASSWORD
        - name: EMPTY
          value: {{ .Values.postgres.empty | ternary "yes" "no" | quote }}
        volumeMounts:
        - name: vol-c
          mountPath: /root/.config/rclone
          readOnly: true
        - name: vol-c
          mountPath: /var/lib/postgresql/.config/rclone
          readOnly: true
        - name: vol-postgres-init
          mountPath: /postgres-init
          readOnly: true
        - name: vol-docker-entrypoint-initdb-d
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        - name: vol-shared
          mountPath: /shared
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      - name: {{ include "postgresRclone.name" . }}-password-sync
        image: {{ .Values.postgres.image }}
        command: ["/bin/sh","-c"]
        args:
        - "exec /bin/sh /postgres-init/password-sync.sh"
        volumeMounts:
        - name: vol-postgres-init
          mountPath: /postgres-init
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: vol-c
        secret:
          secretName: {{ include "postgresRclone.secret.rclone.conf" . }}
          items:
          - key: rcloneConf
            path: rclone.conf
      - name: vol-postgres-init
        configMap:
          name: {{ include "postgresRclone.configmap.init" . }}
      - name: vol-docker-entrypoint-initdb-d
        configMap:
          name: {{ include "postgresRclone.configmap.entrypoint" . }}
      - name: vol-shared
        emptyDir: {}
