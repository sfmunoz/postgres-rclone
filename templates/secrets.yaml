apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "postgresRclone.secret.superuser.password" . }}
  labels:
    {{- include "postgresRclone.labels" . | nindent 4 }}
data:
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | b64enc | quote }}

---

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "postgresRclone.secret.rclone.conf" . }}
  labels:
    {{- include "postgresRclone.labels" . | nindent 4 }}
data:
  rcloneConf: {{ required "rclone.conf required" .Values.rclone.conf | b64enc | quote }}
